# looks for dockerfile in build, maps port on machine to port in container
services:
  # name of container = backend
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - DOCKER=true
    networks:
      - app-network
    restart: unless-stopped

  # db:
    # image: postgres:latest
    # environment:
    #   user: user
    #   pass: pass
    # volumes:
    #   - postgres_data:/var/lub/postgresql/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"       # http://localhost  → nginx → React SPA
    depends_on:
      - backend

    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

# volume = folder for multi-container sharing
# volumes:
#   postgres data:

# can run multiple containers --> frontend service, db service --> move docker to project root or confusing routing

# docker-compose up --build

# can do in cloud with docker build cloud --> builds using cloud/cache, speeding up

